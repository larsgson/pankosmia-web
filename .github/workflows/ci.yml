name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/<owner>/pankosmia-docker

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev cmake zlib1g-dev openssl

      - name: cargo build
        run: cargo build --locked

      - name: cargo test --lib
        run: cargo test --locked --lib

      - name: cargo test (FS-backend integration)
        run: cargo test --locked --test sse_ingredient --test fs_language_store

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (informational)
        # Surfaces clippy hints in the build log without failing the
        # job. The codebase has ~160 legacy warnings from the
        # pankosmia-web era; clean them in focused passes rather than
        # in a single sweep. Promote to `-D warnings` once down to
        # zero.
        run: cargo clippy --locked --all-targets

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push on main and on version tags; PRs are build-only.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch          # main branch → :main
            type=sha,format=short          # immutable: :sha-1a2b3c4
            type=semver,pattern={{version}}    # v1.2.3 → :1.2.3
            type=semver,pattern={{major}}.{{minor}}  # v1.2.3 → :1.2
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Railway redeploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sf https://backboard.railway.app/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"0cf9e682-529f-41ea-8a34-140db527f84e\", environmentId: \"0a5e752d-5f0c-4dec-91db-9f4d8938e70f\") }"}'
